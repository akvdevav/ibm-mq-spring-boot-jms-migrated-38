servers:
  mq:
    host: 127.0.0.1
    port: 1415
    queue-manager: ONE.QM
    channel: ONE.SVR.CONN
    queue: ONE.QUEUE
    topic: ONE/TOPIC
    timeout: 2000
    username: guest
    password: guest

spring:
  rabbitmq:
    host: ${servers.mq.host}
    port: ${servers.mq.port}
    username: ${servers.mq.username}
    password: ${servers.mq.password}
    listener:
      simple:
        concurrency: 1
        max-concurrency: 1
        acknowledge-mode: auto
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  redis:
    host: localhost
    port: 6379